  <script>
    // Sidebar toggle via topbar back button
    const sidebar = document.querySelector('.sidebar');
    const topbarBackBtn = document.querySelector('.topbar-back-btn');
    topbarBackBtn.addEventListener('click', () => sidebar.classList.toggle('collapsed'));

    // Enable Save button on any settings input change
    const saveBtn = document.querySelector('.settings-save-btn');
    const cancelBtn = document.querySelector('.settings-cancel-btn');
    const settingsContainer = document.querySelector('.settings-container');
    const initialValues = new Map();

    settingsContainer.querySelectorAll('input, textarea, select').forEach(el => {
      initialValues.set(el, el.value);
      const eventName = el.tagName === 'SELECT' ? 'change' : 'input';
      el.addEventListener(eventName, () => { saveBtn.disabled = false; });
    });

    cancelBtn.addEventListener('click', () => {
      initialValues.forEach((value, el) => { el.value = value; });
      saveBtn.disabled = true;
    });
    saveBtn.addEventListener('click', () => {
      settingsContainer.querySelectorAll('input, textarea, select').forEach(el => {
        initialValues.set(el, el.value);
      });
      saveBtn.disabled = true;
    });

    // AI Panel
    const aiPanel = document.getElementById('aiPanel');
    const askAiBtn = document.querySelector('.topbar-ask-ai-btn');
    const aiPanelClose = document.getElementById('aiPanelClose');
    const aiPanelInput = document.getElementById('aiPanelInput');
    const aiPanelSend = document.getElementById('aiPanelSend');
    const contentWrapper = document.querySelector('.content-wrapper');

    askAiBtn.addEventListener('click', () => {
      aiPanel.classList.toggle('open');
      contentWrapper.classList.toggle('ai-open');
      if (aiPanel.classList.contains('open')) setTimeout(() => aiPanelInput.focus(), 300);
    });
    aiPanelClose.addEventListener('click', () => {
      aiPanel.classList.remove('open');
      contentWrapper.classList.remove('ai-open');
      aiPanelInput.value = '';
      aiPanelSend.disabled = true;
    });
    document.querySelectorAll('.ai-suggestion-btn').forEach(btn => {
      btn.addEventListener('click', e => { aiPanelInput.value = e.target.textContent; aiPanelInput.focus(); });
    });
    aiPanelSend.addEventListener('click', () => {
      const message = aiPanelInput.value.trim();
      if (message) { console.log('Sending:', message); aiPanelInput.value = ''; aiPanelSend.disabled = true; }
    });
    aiPanelInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        aiPanelSend.click();
      }
    });
    aiPanelInput.addEventListener('input', () => { aiPanelSend.disabled = !aiPanelInput.value.trim(); });

    // Verify Cognigy connection once both API key and Site URL are filled
    const apiKeyInput = document.getElementById('apiKey');
    const siteUrlInput = document.getElementById('siteUrl');
    const verifyIndicator = document.getElementById('cognigyVerify');
    const editApiKeyBtn = document.getElementById('editApiKeyBtn');
    let verifyTimer = null;

    function bothFilled() {
      return apiKeyInput.value.trim() && siteUrlInput.value.trim();
    }
    function resetVerify() {
      verifyIndicator.dataset.state = 'idle';
      if (verifyTimer) { clearTimeout(verifyTimer); verifyTimer = null; }
    }
    function lockApiKey() {
      apiKeyInput.disabled = true;
      apiKeyInput.type = 'password';
    }
    function unlockApiKey() {
      apiKeyInput.disabled = false;
      apiKeyInput.type = 'text';
      apiKeyInput.value = '';
      apiKeyInput.focus();
      resetVerify();
    }
    function runVerify() {
      if (!bothFilled()) { resetVerify(); return; }
      verifyIndicator.dataset.state = 'verifying';
      if (verifyTimer) clearTimeout(verifyTimer);
      verifyTimer = setTimeout(() => {
        verifyIndicator.dataset.state = 'success';
        lockApiKey();
      }, 1500);
    }
    if (editApiKeyBtn) editApiKeyBtn.addEventListener('click', unlockApiKey);

    [apiKeyInput, siteUrlInput].forEach(input => {
      input.addEventListener('input', resetVerify);
      input.addEventListener('blur', runVerify);
    });
  </script>
  <!-- A11y: sync ARIA on .ai-panel + its trigger when `.open` toggles. -->
  <script>
    (function () {
      const panel = document.getElementById('aiPanel');
      const trigger = document.querySelector('.topbar-ask-ai-btn');
      if (!panel) return;
      // Track previously-focused element so we can restore focus on close.
      let lastFocus = null;

      const syncAria = () => {
        const open = panel.classList.contains('open');
        panel.setAttribute('aria-hidden', open ? 'false' : 'true');
        if (trigger) trigger.setAttribute('aria-expanded', open ? 'true' : 'false');
        if (open) {
          lastFocus = document.activeElement;
          const focusTarget = panel.querySelector('input, textarea, button, [tabindex]:not([tabindex="-1"])');
          if (focusTarget) setTimeout(() => focusTarget.focus(), 50);
        } else if (lastFocus && typeof lastFocus.focus === 'function') {
          lastFocus.focus();
          lastFocus = null;
        }
      };

      // Initial sync (in case .open is already present on load).
      syncAria();

      // React to class changes triggered by the existing open/close handlers.
      new MutationObserver((mutations) => {
        if (mutations.some(m => m.attributeName === 'class')) syncAria();
      }).observe(panel, { attributes: true, attributeFilter: ['class'] });

      // Escape closes the panel.
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && panel.classList.contains('open')) {
          panel.classList.remove('open');
          const wrapper = document.querySelector('.content-wrapper');
          if (wrapper) wrapper.classList.remove('ai-open');
        }
      });

      // Trap Tab inside the panel while it's open.
      panel.addEventListener('keydown', (e) => {
        if (e.key !== 'Tab' || !panel.classList.contains('open')) return;
        const focusables = panel.querySelectorAll(
          'a[href], button:not([disabled]), textarea:not([disabled]), input:not([disabled]), select:not([disabled]), [tabindex]:not([tabindex="-1"])'
        );
        if (!focusables.length) return;
        const first = focusables[0];
        const last = focusables[focusables.length - 1];
        if (e.shiftKey && document.activeElement === first) {
          e.preventDefault();
          last.focus();
        } else if (!e.shiftKey && document.activeElement === last) {
          e.preventDefault();
          first.focus();
        }
      });
    })();
  </script>
  <!-- A11y: sync topbar-back-btn aria-expanded with .sidebar.collapsed. -->
  <script>
    (function () {
      const sidebar = document.querySelector('.sidebar');
      const trigger = document.querySelector('.topbar-back-btn');
      if (!sidebar || !trigger) return;
      const sync = () => {
        const collapsed = sidebar.classList.contains('collapsed');
        trigger.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
      };
      sync();
      new MutationObserver(() => sync()).observe(sidebar, {
        attributes: true, attributeFilter: ['class']
      });
    })();
  </script>
  <!-- A11y: shared dialog ARIA sync for `[hidden]`-driven modals. -->
  <script>
    (function () {
      const SELECTOR = '.modal-backdrop, .share-modal-backdrop, .chart-modal-backdrop, .chart-card-fullscreen-backdrop';
      const focusStack = new WeakMap();

      const focusablesIn = (root) => root.querySelectorAll(
        'a[href], button:not([disabled]), textarea:not([disabled]), input:not([disabled]), select:not([disabled]), [tabindex]:not([tabindex="-1"])'
      );

      const sync = (el) => {
        const isOpen = !el.hidden;
        el.setAttribute('aria-hidden', isOpen ? 'false' : 'true');
        if (!el.hasAttribute('role')) el.setAttribute('role', 'dialog');
        if (!el.hasAttribute('aria-modal')) el.setAttribute('aria-modal', 'true');
        if (isOpen) {
          focusStack.set(el, document.activeElement);
          const focusables = focusablesIn(el);
          if (focusables.length) setTimeout(() => focusables[0].focus(), 50);
        } else {
          const prev = focusStack.get(el);
          if (prev && typeof prev.focus === 'function') prev.focus();
          focusStack.delete(el);
        }
      };

      const observe = (el) => {
        if (el.dataset.a11yWired === '1') return;
        el.dataset.a11yWired = '1';
        sync(el);
        new MutationObserver((mutations) => {
          if (mutations.some(m => m.attributeName === 'hidden')) sync(el);
        }).observe(el, { attributes: true, attributeFilter: ['hidden'] });

        // Tab trap
        el.addEventListener('keydown', (e) => {
          if (el.hidden) return;
          if (e.key === 'Escape') {
            el.hidden = true;
            return;
          }
          if (e.key !== 'Tab') return;
          const focusables = focusablesIn(el);
          if (!focusables.length) return;
          const first = focusables[0];
          const last = focusables[focusables.length - 1];
          if (e.shiftKey && document.activeElement === first) {
            e.preventDefault();
            last.focus();
          } else if (!e.shiftKey && document.activeElement === last) {
            e.preventDefault();
            first.focus();
          }
        });
      };

      // Wire existing modals on load.
      document.querySelectorAll(SELECTOR).forEach(observe);

      // Catch dialogs added later (e.g. the fullscreen chart overlay).
      new MutationObserver((mutations) => {
        mutations.forEach((m) => {
          m.addedNodes.forEach((node) => {
            if (!(node instanceof Element)) return;
            if (node.matches(SELECTOR)) observe(node);
            node.querySelectorAll && node.querySelectorAll(SELECTOR).forEach(observe);
          });
        });
      }).observe(document.body, { childList: true, subtree: true });
    })();
  </script>
  <!-- A11y: track whether the user is navigating via Tab so the focus
       ring only shows during keyboard navigation, not on mouse clicks. -->
  <script>
    (function () {
      const body = document.body;
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Tab') body.classList.add('using-keyboard');
      });
      const drop = () => body.classList.remove('using-keyboard');
      document.addEventListener('mousedown', drop, true);
      document.addEventListener('pointerdown', drop, true);
      document.addEventListener('touchstart', drop, { capture: true, passive: true });
    })();
  </script>
<script src="/js/filter-keyboard.js"></script>
</body>
