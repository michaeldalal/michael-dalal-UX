<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NBA Champions Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #f6f8fa;
      --surface: #ffffff;
      --surface2: #eaeef2;
      --border: #d0d7de;
      --gold: #9a6e00;
      --gold-dim: #b8860b;
      --text: #1f2328;
      --muted: #57606a;
      --accent: #0969da;
      --red: #cf222e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #fff8e1 0%, #fef3c7 50%, #f6f8fa 100%);
      border-bottom: 2px solid var(--gold-dim);
      padding: 28px 32px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .trophy { font-size: 3rem; }
    header h1 { font-size: 2rem; font-weight: 700; color: var(--gold); letter-spacing: -0.5px; }
    header p { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }

    /* ── Layout ── */
    main { max-width: 1400px; margin: 0 auto; padding: 32px; }

    /* ── Filter bar ── */
    .filters {
      display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; align-items: center;
    }
    .filters label { color: var(--muted); font-size: 0.85rem; }
    .filters select, .filters input {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); padding: 8px 12px; border-radius: 8px; font-size: 0.875rem;
      cursor: pointer;
    }
    .filters select:focus, .filters input:focus {
      outline: none; border-color: var(--accent);
    }

    /* ── Stats strip ── */
    .stat-strip {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px; margin-bottom: 32px;
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px;
    }
    .stat-card .val { font-size: 2rem; font-weight: 700; color: var(--gold); }
    .stat-card .lbl { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

    /* ── Grid ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 32px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; margin-bottom: 32px; }
    @media (max-width: 1100px) { .grid-3 { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 800px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

    /* ── Panel ── */
    .panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 24px;
    }
    .panel h2 {
      font-size: 1rem; font-weight: 600; color: var(--text);
      margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
    }
    .panel h2 span { font-size: 1.1rem; }
    .chart-wrap { position: relative; height: 280px; }

    /* ── Champions table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    thead th {
      padding: 10px 14px; text-align: left; color: var(--muted);
      font-weight: 500; font-size: 0.78rem; text-transform: uppercase;
      letter-spacing: 0.05em; border-bottom: 1px solid var(--border);
      cursor: pointer; white-space: nowrap;
      user-select: none;
    }
    thead th:hover { color: var(--accent); }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: 10px 14px; vertical-align: middle; white-space: nowrap; }
    .year-badge {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 2px 8px; font-weight: 600; font-size: 0.85rem;
    }
    .team-logo { font-size: 1.3rem; margin-right: 6px; }
    .team-name { font-weight: 500; }
    .mvp-name { color: var(--accent); }
    .ppg { font-weight: 700; color: var(--gold); }
    .series { font-size: 0.8rem; color: var(--muted); }

    /* ── Team chip ── */
    .chip {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 0.75rem; font-weight: 600; border: 1px solid;
    }
    .chip-lakers  { color:#552583; border-color:#552583; background:#f5eeff; }
    .chip-celtics { color:#007a33; border-color:#007a33; background:#eafaf0; }
    .chip-bulls   { color:#ce1141; border-color:#ce1141; background:#fff0f2; }
    .chip-spurs   { color:#4a4a4a; border-color:#8a8d8f; background:#f0f0f0; }
    .chip-warriors{ color:#006bb6; border-color:#ffc72c; background:#eff7ff; }
    .chip-heat    { color:#98002e; border-color:#98002e; background:#fff5e6; }
    .chip-pistons { color:#c8102e; border-color:#006bb6; background:#f0f7ff; }
    .chip-mavs    { color:#00538c; border-color:#00538c; background:#e6f4ff; }
    .chip-cavs    { color:#860038; border-color:#fdbb30; background:#fff8e6; }
    .chip-raptors { color:#ce1141; border-color:#ce1141; background:#fff0f2; }
    .chip-bucks   { color:#00471b; border-color:#00471b; background:#eafaf0; }
    .chip-nuggets { color:#0e2240; border-color:#0e2240; background:#fffbe6; }
    .chip-76ers   { color:#006bb6; border-color:#ed174c; background:#f0f7ff; }
    .chip-rockets { color:#ce1141; border-color:#ce1141; background:#fff0f2; }
    .chip-default { color:var(--muted); border-color:var(--border); background:var(--surface2); }

    /* ── Pagination ── */
    .pagination {
      display: flex; gap: 8px; justify-content: center;
      margin-top: 20px; align-items: center;
    }
    .pagination button {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 6px 14px; border-radius: 6px; cursor: pointer;
      font-size: 0.85rem;
    }
    .pagination button.active { background: var(--gold); color: #000; font-weight: 700; border-color: var(--gold); }
    .pagination button:hover:not(.active) { border-color: var(--accent); }

    /* ── GOAT spotlight ── */
    .goat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .goat-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 18px;
      transition: border-color 0.2s;
    }
    .goat-card:hover { border-color: var(--gold-dim); }
    .goat-card .emoji { font-size: 2rem; margin-bottom: 8px; }
    .goat-card .name { font-weight: 700; font-size: 0.95rem; }
    .goat-card .rings { color: var(--gold); font-size: 0.8rem; margin-top: 4px; }
    .goat-card .stat-row { display: flex; gap: 12px; margin-top: 8px; }
    .goat-card .s { font-size: 0.78rem; color: var(--muted); }
    .goat-card .s b { color: var(--text); display: block; font-size: 0.9rem; }

    /* ── Sort indicator ── */
    .sort-asc::after { content: ' ▲'; font-size: 0.7em; }
    .sort-desc::after { content: ' ▼'; font-size: 0.7em; }
  </style>
</head>
<body>

<header>
  <div class="trophy">🏆</div>
  <div>
    <h1>NBA Champions Dashboard</h1>
    <p>All champions · Finals MVPs · Key stats · 1980–2024</p>
  </div>
</header>

<main>

  <!-- Stat Strip -->
  <div class="stat-strip" id="statStrip"></div>

  <!-- Charts row -->
  <div class="grid-2">
    <div class="panel">
      <h2><span>🥇</span> Championships by Team</h2>
      <div class="chart-wrap"><canvas id="champsByTeam"></canvas></div>
    </div>
    <div class="panel">
      <h2><span>📈</span> Finals MVP Scoring (PPG)</h2>
      <div class="chart-wrap"><canvas id="mvpPpgChart"></canvas></div>
    </div>
  </div>

  <!-- GOAT Spotlights -->
  <div class="panel" style="margin-bottom:32px">
    <h2><span>⭐</span> All-Time Finals Legends</h2>
    <div class="goat-grid" id="goatGrid"></div>
  </div>

  <!-- Full Champions Table -->
  <div class="panel">
    <h2><span>📋</span> All Champions</h2>
    <div class="filters">
      <label>Team</label>
      <select id="filterTeam"><option value="">All Teams</option></select>
      <label>Decade</label>
      <select id="filterDecade">
        <option value="">All Decades</option>
        <option value="1980">1980s</option>
        <option value="1990">1990s</option>
        <option value="2000">2000s</option>
        <option value="2010">2010s</option>
        <option value="2020">2020s</option>
      </select>
      <label>Search MVP</label>
      <input type="text" id="searchMvp" placeholder="e.g. LeBron…" style="width:160px"/>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th data-col="year">Year</th>
            <th data-col="team">Champion</th>
            <th data-col="opponent">Opponent</th>
            <th data-col="series">Series</th>
            <th data-col="mvp">Finals MVP</th>
            <th data-col="ppg">MVP PPG</th>
            <th data-col="rpg">MVP RPG</th>
            <th data-col="apg">MVP APG</th>
          </tr>
        </thead>
        <tbody id="champTable"></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>

</main>

  const map = {

// ── Stat strip ────────────────────────────────────────────────────────────────
function renderStatStrip(data) {
  const teams = {};
  data.forEach(c => { teams[c.team] = (teams[c.team]||0)+1; });
  const maxTeam = Object.entries(teams).sort((a,b)=>b[1]-a[1])[0];

  const avgPpg  = (data.reduce((s,c)=>s+c.ppg,0)/data.length).toFixed(1);

    <div class="stat-card"><div class="val">${maxTeam ? maxTeam[1] : '—'}</div><div class="lbl">🏆 Most titles · ${maxTeam ? maxTeam[0].split(' ').slice(-1)[0] : ''}</div></div>
    <div class="stat-card"><div class="val">${highPpg ? highPpg.ppg : '—'}</div><div class="lbl">Highest MVP PPG · ${highPpg ? highPpg.mvp.split(' ').slice(-1)[0] : ''} '${highPpg ? String(highPpg.year).slice(2) : ''}</div></div>
    <div class="stat-card"><div class="val">${avgPpg}</div><div class="lbl">Avg MVP PPG</div></div>
    <div class="stat-card"><div class="val">${sweeps}</div><div class="lbl">4-0 Sweeps</div></div>
  `;
}

// ── GOAT grid ─────────────────────────────────────────────────────────────────
function renderGoats() {
  document.getElementById("goatGrid").innerHTML = goats.map(g => `
    <div class="goat-card">
      <div class="emoji">${g.emoji}</div>
      <div class="name">${g.name}</div>
      <div class="rings">${'🏆'.repeat(Math.min(g.rings,6))} ${g.rings} ring${g.rings!==1?'s':''}</div>
      <div style="font-size:0.75rem;color:var(--muted);margin-top:4px">${g.team}</div>
      <div class="stat-row">
        <div class="s"><b>${g.ppg}</b>PPG</div>
        <div class="s"><b>${g.rpg}</b>RPG</div>
        <div class="s"><b>${g.apg}</b>APG</div>
      </div>
    </div>
  `).join('');
}

// ── Charts ────────────────────────────────────────────────────────────────────
let teamChart, ppgChart;

function buildCharts() {
  // Championships by team
  const teamCounts = {};
  champions.forEach(c => { teamCounts[c.team] = (teamCounts[c.team]||0)+1; });
  const sorted = Object.entries(teamCounts).sort((a,b)=>b[1]-a[1]).slice(0,10);

  const teamColors = sorted.map(([t]) => {
    const map = {
      "Los Angeles Lakers":"#fdb927",
      "Boston Celtics":"#007a33",
      "Chicago Bulls":"#ce1141",
      "San Antonio Spurs":"#8a8d8f",
      "Golden State Warriors":"#ffc72c",
      "Miami Heat":"#98002e",
      "Detroit Pistons":"#c8102e",
      "Philadelphia 76ers":"#ed174c",
      "Houston Rockets":"#ce1141",
      "Milwaukee Bucks":"#00471b",
      "Cleveland Cavaliers":"#860038",
      "Dallas Mavericks":"#00538c",
      "Toronto Raptors":"#ce1141",
      "Denver Nuggets":"#fec524",
    };
    return map[t] || "#58a6ff";
  });

  if (teamChart) teamChart.destroy();
  teamChart = new Chart(document.getElementById("champsByTeam"), {
    type: "bar",
    data: {
      labels: sorted.map(([t]) => t.replace("Los Angeles ","LA ").replace("Golden State ","GS ")),
      datasets: [{ data: sorted.map(([,v])=>v), backgroundColor: teamColors, borderRadius: 6, borderSkipped: false }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks:{ color:"#57606a", font:{size:11} }, grid:{color:"#d0d7de"} },
        y: { ticks:{ color:"#57606a", stepSize:1 }, grid:{color:"#d0d7de"}, beginAtZero:true }
      }
    }
  });

  // MVP PPG over years
  const ppgData = [...filtered].sort((a,b)=>a.year-b.year);
  if (ppgChart) ppgChart.destroy();
  ppgChart = new Chart(document.getElementById("mvpPpgChart"), {
    type: "line",
    data: {
      labels: ppgData.map(c=>c.year),
      datasets: [{
        label: "MVP PPG",
        data: ppgData.map(c=>c.ppg),
        borderColor: "#f5c518",
        backgroundColor: "rgba(245,197,24,0.12)",
        borderWidth: 2,
        pointRadius: 4,
        pointHoverRadius: 7,
        fill: true,
        tension: 0.3,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const c = ppgData[ctx.dataIndex];
              return `${c.mvp} — ${c.ppg} PPG`;
            }
          }
        }
      },
      scales: {
        x: { ticks:{color:"#57606a", maxTicksLimit:10}, grid:{color:"#d0d7de"} },
        y: { ticks:{color:"#57606a"}, grid:{color:"#d0d7de"} }
      }
    }
  });
}

// ── Table ─────────────────────────────────────────────────────────────────────
function sortData() {
  filtered.sort((a,b) => {
    let av = a[sortCol], bv = b[sortCol];
    if (typeof av === "string") av = av.toLowerCase(), bv = bv.toLowerCase();
    if (av < bv) return sortDir==="asc" ? -1 : 1;
    if (av > bv) return sortDir==="asc" ? 1 : -1;
    return 0;
  });
}

function renderTable() {
  sortData();
  const slice = filtered.slice(page*PAGE, (page+1)*PAGE);
  document.getElementById("champTable").innerHTML = slice.map(c => `
    <tr>
      <td><span class="year-badge">${c.year}</span></td>
      <td><span class="team-logo">${c.logo}</span><span class="team-name"><span class="chip ${chipClass(c.chip)}">${c.team}</span></span></td>
      <td style="color:var(--muted)">${c.opponent}</td>
      <td><span class="series">${c.series}</span></td>
      <td class="mvp-name">${c.mvp}</td>
      <td class="ppg">${c.ppg}</td>
      <td style="color:var(--muted)">${c.rpg}</td>
      <td style="color:var(--muted)">${c.apg}</td>
    </tr>
  `).join('');

  // pagination
  const pages = Math.ceil(filtered.length/PAGE);
  const pag = document.getElementById("pagination");
  if (pages <= 1) { pag.innerHTML=''; return; }
  pag.innerHTML = Array.from({length:pages},(_,i)=>
    `<button class="${i===page?'active':''}" onclick="goPage(${i})">${i+1}</button>`
  ).join('');
}

function goPage(p) { page=p; renderTable(); }

// ── Sort headers ──────────────────────────────────────────────────────────────
document.querySelectorAll("thead th[data-col]").forEach(th => {
  th.addEventListener("click", () => {
    const col = th.dataset.col;
    if (sortCol===col) sortDir = sortDir==="asc"?"desc":"asc";
    else { sortCol=col; sortDir="desc"; }
    document.querySelectorAll("thead th").forEach(t=>t.classList.remove("sort-asc","sort-desc"));
    th.classList.add(sortDir==="asc"?"sort-asc":"sort-desc");
    page=0; renderTable();
  });
});

// ── Filters ───────────────────────────────────────────────────────────────────
const teams = [...new Set(champions.map(c=>c.team))].sort();
const sel = document.getElementById("filterTeam");
teams.forEach(t => { const o=document.createElement("option"); o.value=o.textContent=t; sel.appendChild(o); });

function applyFilters() {
  const team   = document.getElementById("filterTeam").value;
  const decade = document.getElementById("filterDecade").value;
  const mvp    = document.getElementById("searchMvp").value.toLowerCase();
  filtered = champions.filter(c =>
    (!team   || c.team===team) &&
    (!decade || Math.floor(c.year/10)*10 === +decade) &&
    (!mvp    || c.mvp.toLowerCase().includes(mvp))
  );
  page=0;
  renderStatStrip(filtered);
  buildCharts();
  renderTable();
}

["filterTeam","filterDecade","searchMvp"].forEach(id =>
  document.getElementById(id).addEventListener(id==="searchMvp"?"input":"change", applyFilters)
);

// ── Init ──────────────────────────────────────────────────────────────────────
renderStatStrip(champions);
renderGoats();
buildCharts();
renderTable();

// set default sort indicator
document.querySelector('th[data-col="year"]').classList.add("sort-desc");
</script>
</body>
</html>
